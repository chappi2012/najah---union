<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAJAH Union — Team Platform</title>
<style>
:root{
  --dark-bg:#0F1219;
  --dark-card:#1a1f2e;
  --dark-input:#252c3d;
  --accent1:#FF6B6B;
  --accent2:#4ECDC4;
  --accent3:#FFE66D;
  --accent4:#95E1D3;
  --accent5:#F38181;
  --accent6:#AA96DA;
  --accent7:#FCBAD3;
  --accent8:#A8D8EA;
  --gold:#FFD93D;
  --text:#E8E8E8;
  --text-muted:#A8A8A8
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;background:#0F1219}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg, #0F1219 0%, #1a1f2e 100%);color:var(--text);overflow-x:hidden}

/* ===== LOGIN SCREEN (FULL PAGE) ===== */
#authScreen{position:fixed;inset:0;z-index:2000;background:linear-gradient(135deg,#0F1219 0%,#1a0033 50%,#330033 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
#authScreen.hidden{display:none}
.auth-container{background:linear-gradient(145deg, #1a1f2e 0%, #252c3d 100%);border-radius:24px;padding:4rem;max-width:500px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,0.8), 0 0 60px rgba(255, 107, 107, 0.3)}
.auth-container h1{font-size:2.5rem;background:linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem;text-align:center}
.auth-container h1 span{background:linear-gradient(135deg, #FFE66D, #FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-subtitle{text-align:center;color:var(--text-muted);margin-bottom:2.5rem;font-size:1.1rem}
.auth-tabs{display:flex;background:rgba(255,107,107,0.1);border-radius:12px;margin-bottom:2rem;overflow:hidden;border:2px solid rgba(78,205,196,0.3)}
.auth-tab{flex:1;padding:1rem;text-align:center;border:none;background:none;cursor:pointer;font-weight:700;font-size:1rem;color:var(--text-muted);transition:all 0.3s}
.auth-tab.active{background:linear-gradient(135deg, #FF6B6B, #4ECDC4);color:#000;font-weight:800}
.auth-form{margin-bottom:1.5rem}
.auth-field{margin-bottom:1.5rem}
.auth-field label{display:block;margin-bottom:0.5rem;font-weight:700;font-size:1rem;background:linear-gradient(135deg, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.auth-field input{width:100%;padding:1rem;border:2px solid rgba(255,107,107,0.3);border-radius:10px;font-size:1rem;outline:none;background:var(--dark-input);color:var(--text)}
.auth-field input:focus{border-color:#FF6B6B;background:rgba(255,107,107,0.05);box-shadow:0 0 20px rgba(255,107,107,0.2)}
.auth-submit{width:100%;padding:1rem;background:linear-gradient(135deg, #FF6B6B, #FFE66D);color:#000;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:1.1rem;margin-top:1rem;transition:all 0.3s}
.auth-submit:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,107,0.4)}
.auth-error{color:#FF6B6B;text-align:center;margin-top:1rem;font-weight:600;display:none;background:rgba(255,107,107,0.1);padding:1rem;border-radius:8px;border:1px solid rgba(255,107,107,0.3)}
.auth-error.show{display:block}

/* ===== HEADER ===== */
header{background:linear-gradient(90deg, #1a1f2e 0%, #252c3d 50%, #1a0033 100%);color:var(--text);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(255,107,107,0.15);border-bottom:2px solid rgba(78,205,196,0.3)}
.header-left{display:flex;align-items:center;gap:2rem;flex:1}
header h1{font-size:1.8rem;font-weight:800;margin:0;background:linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-nav{display:flex;gap:3rem}
.nav-item{color:var(--text-muted);text-decoration:none;font-weight:700;cursor:pointer;font-size:1rem;transition:all 0.3s}
.nav-item:hover,.nav-item.active{background:linear-gradient(135deg, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800}
.header-right{display:flex;align-items:center;gap:1.5rem}
.user-info{background:linear-gradient(135deg, #FF6B6B, #95E1D3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:700;font-size:1rem}
.logout-btn{background:linear-gradient(135deg, #FF6B6B, #F38181);color:#000;padding:0.7rem 1.5rem;border:none;border-radius:8px;cursor:pointer;font-weight:800;font-size:0.95rem;transition:all 0.3s}
.logout-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,107,0.4)}

/* ===== MAIN CONTENT ===== */
#app{display:none;min-height:calc(100vh - 80px)}
#app.show{display:block}
.content{display:grid;grid-template-columns:1fr 1fr;gap:2rem;padding:2rem;max-width:1800px;margin:0 auto}

/* ===== SECTION ===== */
.section{background:linear-gradient(145deg, #1a1f2e 0%, #252c3d 100%);border:2px solid rgba(78,205,196,0.3);border-radius:16px;padding:2rem;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.section h2{font-size:1.5rem;background:linear-gradient(135deg, #FF6B6B, #4ECDC4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem;display:flex;align-items:center;gap:0.5rem;font-weight:800}
.subsection{margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:2px solid rgba(255,107,107,0.2)}
.subsection:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.subsection-title{font-weight:700;background:linear-gradient(135deg, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.2rem;font-size:1.2rem}

/* ===== TEAM DISPLAY ===== */
.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1.5rem}
.team-card-display{padding:1.5rem;border-radius:16px;text-align:center;color:#000;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:0.8rem;box-shadow:0 12px 40px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.1);transition:all 0.3s}
.team-card-display:hover{transform:translateY(-5px);box-shadow:0 16px 50px rgba(0,0,0,0.6)}
.team-emoji{font-size:3rem;animation:float 3s ease-in-out infinite}
.team-name{font-size:1.1rem;font-weight:800}
.team-points{font-size:0.95rem;opacity:0.9;background:rgba(0,0,0,0.2);padding:0.3rem 0.8rem;border-radius:6px}

@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-10px)}}

/* ===== LEADERBOARD ===== */
.leaderboard{background:linear-gradient(145deg, #252c3d, #1a1f2e);border-radius:12px;overflow:hidden;border:2px solid rgba(255,107,107,0.2)}
.lb-row{padding:1.2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid rgba(78,205,196,0.15);transition:all 0.3s}
.lb-row:hover{background:rgba(78,205,196,0.1)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-weight:900;font-size:1.6rem;background:linear-gradient(135deg, #FFE66D, #FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;min-width:50px}
.lb-info{flex:1;margin-left:1rem}
.lb-name{font-weight:800;font-size:1.1rem;color:var(--text);margin-bottom:0.3rem}
.lb-team{color:var(--text-muted);font-size:0.9rem}
.lb-points{font-weight:900;font-size:1.4rem;background:linear-gradient(135deg, #4ECDC4, #95E1D3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ===== ADMIN SECTION ===== */
.admin-section{background:linear-gradient(145deg, #1a1f2e 0%, #252c3d 100%);border:2px solid rgba(78,205,196,0.3);border-radius:16px;padding:2rem;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.admin-section h2{font-size:1.5rem;background:linear-gradient(135deg, #FF6B6B, #4ECDC4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem;font-weight:800}

/* ===== TEAM SETUP ===== */
.team-setup-container{background:linear-gradient(145deg, rgba(255,107,107,0.1), rgba(78,205,196,0.1));border:2px solid rgba(255,107,107,0.2);border-radius:12px;padding:2rem;margin-bottom:2rem}
.setup-label{font-weight:800;background:linear-gradient(135deg, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;font-size:1.15rem}
.team-count-row{display:flex;gap:1.5rem;align-items:center;margin-bottom:2rem;background:rgba(78,205,196,0.1);padding:1.5rem;border-radius:12px;border:2px solid rgba(78,205,196,0.2)}
.team-count-row label{font-weight:800;min-width:200px;font-size:1.05rem;background:linear-gradient(135deg, #FF6B6B, #4ECDC4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.team-count-row select{padding:0.8rem;border:2px solid rgba(255,107,107,0.3);border-radius:8px;font-size:1rem;outline:none;cursor:pointer;min-width:120px;background:var(--dark-input);color:var(--text);font-weight:700}
.team-count-row select:focus{border-color:#4ECDC4;box-shadow:0 0 20px rgba(78,205,196,0.2)}

.team-editor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1.5rem;margin-bottom:2rem}
.team-editor-card{background:linear-gradient(145deg, #252c3d, #1a1f2e);padding:1.5rem;border:2px solid rgba(78,205,196,0.3);border-radius:12px;transition:all 0.3s}
.team-editor-card:hover{border-color:#FF6B6B;box-shadow:0 8px 24px rgba(255,107,107,0.2)}
.team-editor-card .label{font-size:0.85rem;background:linear-gradient(135deg, #4ECDC4, #FFE66D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:800;margin-bottom:0.8rem;text-transform:uppercase;letter-spacing:0.1em}
.team-editor-card input{width:100%;padding:0.8rem;border:2px solid rgba(78,205,196,0.3);border-radius:8px;font-size:0.95rem;margin-bottom:0.8rem;outline:none;background:var(--dark-input);color:var(--text);font-weight:600}
.team-editor-card input[type="text"]:focus,.team-editor-card input[type="color"]:focus{border-color:#FF6B6B;box-shadow:0 0 15px rgba(255,107,107,0.2)}
.team-editor-card input[type="color"]{height:50px;cursor:pointer;padding:3px}
.team-editor-card .color-display{background:linear-gradient(135deg, rgba(255,107,107,0.2), rgba(78,205,196,0.2));padding:0.8rem;border-radius:8px;text-align:center;font-weight:800;font-size:1.5rem;border:2px dashed rgba(255,107,107,0.3)}

.button-row{display:flex;gap:1rem;margin-bottom:2rem}
.btn-save{flex:1;padding:1rem;background:linear-gradient(135deg, #FF6B6B, #FFE66D);color:#000;border:none;border-radius:10px;font-weight:800;cursor:pointer;font-size:1rem;transition:all 0.3s}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,107,0.4)}
.btn-reset{flex:1;padding:1rem;background:rgba(78,205,196,0.2);color:var(--text);border:2px solid rgba(78,205,196,0.5);border-radius:10px;font-weight:800;cursor:pointer;font-size:1rem;transition:all 0.3s}
.btn-reset:hover{background:rgba(78,205,196,0.3);border-color:#4ECDC4}

/* ===== TEAM PREVIEW ===== */
.team-preview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1.2rem}
.team-preview-card{padding:1.2rem;border-radius:12px;text-align:center;color:#000;font-weight:800;border:2px solid rgba(255,255,255,0.1);transition:all 0.3s;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.team-preview-card:hover{transform:scale(1.05)}
.team-preview-emoji{font-size:2.5rem;margin-bottom:0.5rem;animation:float 3s ease-in-out infinite}
.team-preview-name{font-size:1rem;font-weight:900}

/* ===== MEMBER SECTION ===== */
.member-add{background:linear-gradient(145deg, rgba(255,107,107,0.1), rgba(78,205,196,0.1));border:2px solid rgba(78,205,196,0.2);border-radius:12px;padding:1.5rem;margin-bottom:2rem}
.member-add-form{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:1rem;align-items:end}
.member-add-form input, .member-add-form select{padding:0.8rem;border:2px solid rgba(78,205,196,0.3);border-radius:8px;font-size:0.95rem;outline:none;background:var(--dark-input);color:var(--text);font-weight:600}
.member-add-form input:focus, .member-add-form select:focus{border-color:#FF6B6B;box-shadow:0 0 15px rgba(255,107,107,0.2)}
.member-add-form button{padding:0.8rem 1.5rem;background:linear-gradient(135deg, #4ECDC4, #95E1D3);color:#000;border:none;border-radius:8px;font-weight:800;cursor:pointer;transition:all 0.3s}
.member-add-form button:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(78,205,196,0.4)}

.member-list{background:linear-gradient(145deg, #252c3d, #1a1f2e);border-radius:12px;max-height:400px;overflow-y:auto;border:2px solid rgba(78,205,196,0.2)}
.member-item{padding:1.2rem;border-bottom:2px solid rgba(255,107,107,0.15);display:flex;justify-content:space-between;align-items:center;transition:all 0.3s}
.member-item:hover{background:rgba(78,205,196,0.1)}
.member-item:last-child{border-bottom:none}
.member-name{font-weight:800;font-size:1.05rem;color:var(--text)}
.member-team{color:var(--text-muted);font-size:0.9rem;margin-top:0.2rem}
.member-points{background:linear-gradient(135deg, #FFE66D, #FF6B6B);color:#000;padding:0.5rem 1rem;border-radius:6px;font-weight:900}

/* ===== MESSAGES ===== */
.message{padding:1rem;border-radius:8px;margin-bottom:1rem;display:none;font-weight:700;border:2px solid}
.message.show{display:block}
.message.success{background:rgba(78,205,196,0.2);color:#4ECDC4;border-color:rgba(78,205,196,0.5)}
.message.error{background:rgba(255,107,107,0.2);color:#FF6B6B;border-color:rgba(255,107,107,0.5)}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:rgba(0,0,0,0.3)}
::-webkit-scrollbar-thumb{background:linear-gradient(135deg, #FF6B6B, #4ECDC4);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(135deg, #4ECDC4, #FFE66D)}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){.content{grid-template-columns:1fr}}
@media(max-width:768px){
  header{flex-direction:column;gap:1rem}
  .header-nav{gap:1.5rem;font-size:0.9rem}
  .member-add-form{grid-template-columns:1fr;gap:0.8rem}
  .auth-container{padding:2rem}
  .team-editor-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
}
</style>
<!-- Vercel Web Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<!-- LOGIN SCREEN (FULL PAGE) -->
<div id="authScreen">
  <div class="auth-container">
    <h1>NAJAH <span>Union</span></h1>
    <p class="auth-subtitle">Sign in to access your class platform</p>
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Log In</button>
      <button class="auth-tab" onclick="switchAuth('signup')">Sign Up</button>
    </div>

    <div id="loginForm" class="auth-form">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" value="admin@example.com">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" value="admin123">
      </div>
      <button class="auth-submit" onclick="handleLogin()">🚀 Log In</button>
      <div id="authError" class="auth-error"></div>
    </div>

    <div id="signupForm" class="auth-form" style="display:none">
      <div class="auth-field">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your name">
      </div>
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com">
      </div>
      <div class="auth-field">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="••••••••">
      </div>
      <button class="auth-submit" onclick="handleSignup()">✨ Create Account</button>
      <div id="authError2" class="auth-error"></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<header id="header" style="display:none">
  <div class="header-left">
    <h1>NAJAH <span>Union</span></h1>
    <div class="header-nav">
      <span class="nav-item active" onclick="switchView('dashboard')">📊 Dashboard</span>
      <span class="nav-item" onclick="switchView('admin')">⚙️ Admin Panel</span>
    </div>
  </div>
  <div class="header-right">
    <span class="user-info" id="userEmail"></span>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </div>
</header>

<div id="app">
  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view" class="show">
    <div class="content">
      <div>
        <div class="section">
          <h2>🏆 Teams Overview</h2>
          <div class="team-grid" id="teamDisplay"></div>
        </div>
      </div>
      <div>
        <div class="section">
          <h2>👥 Member Leaderboard</h2>
          <div class="leaderboard" id="leaderboard"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="admin-view">
    <div class="content" style="grid-template-columns:1fr">
      <div class="admin-section">
        <h2>⚙️ Admin Panel — Manage Everything</h2>

        <!-- TEAM SETUP -->
        <div class="team-setup-container">
          <div class="setup-label">🎨 Team Settings — Customize Your Teams</div>
          
          <div class="team-count-row">
            <label for="teamCount">📊 How many teams do you want?</label>
            <select id="teamCount" onchange="renderTeamEditor()">
              <option value="2">2 Teams</option>
              <option value="3" selected>3 Teams</option>
              <option value="4">4 Teams</option>
              <option value="5">5 Teams</option>
              <option value="6">6 Teams</option>
              <option value="7">7 Teams</option>
              <option value="8">8 Teams</option>
            </select>
          </div>

          <div style="margin-bottom:2rem">
            <div class="setup-label" style="margin-bottom:1.2rem">✏️ Set a name and color for each team:</div>
            <div class="team-editor-grid" id="teamEditor"></div>
          </div>

          <div class="button-row">
            <button class="btn-save" onclick="saveTeams()">💾 Save Teams</button>
            <button class="btn-reset" onclick="resetTeams()">↻ Reset Defaults</button>
          </div>
          <div id="teamMsg" class="message"></div>

          <div style="margin-top:2rem;padding-top:2rem;border-top:2px solid rgba(78,205,196,0.2)">
            <div class="setup-label" style="margin-bottom:1.2rem">👀 Live Preview:</div>
            <div class="team-preview-grid" id="teamPreview"></div>
          </div>
        </div>

        <!-- MEMBER MANAGEMENT -->
        <div style="margin-top:3rem;padding-top:3rem;border-top:2px solid rgba(78,205,196,0.2)">
          <div class="setup-label">👤 Member Management</div>
          
          <div class="member-add">
            <div class="member-add-form">
              <input type="text" id="newMemberName" placeholder="Member name">
              <input type="number" id="newMemberPoints" placeholder="Points" value="0">
              <select id="newMemberTeam"></select>
              <button onclick="addMember()">➕ Add</button>
            </div>
          </div>
          <div id="memberMsg" class="message"></div>
          <div class="member-list" id="membersList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================================
// MOCK DATABASE
// ============================================================================
const mockDB = {
  users: [
    { id: 1, email: 'admin@example.com', password: 'admin123', name: 'Admin User', isAdmin: true }
  ],
  teams: [
    { id: 1, name: 'Phoenix', color_hex: '#FF6B6B', emoji: '🔥' },
    { id: 2, name: 'Falcon', color_hex: '#4ECDC4', emoji: '🦅' },
    { id: 3, name: 'Warriors', color_hex: '#FFE66D', emoji: '⚡' }
  ],
  members: [
    { id: 1, name: 'Layla Haddad', team_id: 1, points: 250 },
    { id: 2, name: 'Omar Saleh', team_id: 2, points: 180 },
    { id: 3, name: 'Sara Kanaan', team_id: 3, points: 200 }
  ]
};

let currentUser = null;
let nextUserId = 2;
let nextMemberId = 4;

// ============================================================================
// AUTH FUNCTIONS
// ============================================================================
function switchAuth(which){
  document.getElementById('loginForm').style.display = which === 'login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = which === 'signup' ? 'block' : 'none';
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  clearAuthErrors();
}

function clearAuthErrors(){
  document.getElementById('authError').classList.remove('show');
  document.getElementById('authError2').classList.remove('show');
}

function showAuthError(elemId, msg){
  const el = document.getElementById(elemId);
  el.textContent = '❌ ' + msg;
  el.classList.add('show');
}

function handleLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  
  if(!email || !password){
    showAuthError('authError', 'Email and password required');
    return;
  }
  
  const user = mockDB.users.find(u => u.email === email);
  if(!user || user.password !== password){
    showAuthError('authError', 'Invalid email or password');
    return;
  }
  
  currentUser = user;
  localStorage.setItem('user', JSON.stringify(user));
  enterApp();
}

function handleSignup(){
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  
  if(!name || !email || !password){
    showAuthError('authError2', 'All fields required');
    return;
  }
  
  if(mockDB.users.some(u => u.email === email)){
    showAuthError('authError2', 'Email already exists');
    return;
  }
  
  const newUser = { id: nextUserId++, email, password, name, isAdmin: false };
  mockDB.users.push(newUser);
  currentUser = newUser;
  localStorage.setItem('user', JSON.stringify(newUser));
  enterApp();
}

function enterApp(){
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('header').style.display = 'flex';
  document.getElementById('app').classList.add('show');
  document.getElementById('userEmail').textContent = `Hi, ${currentUser.name}!`;
  renderDashboard();
  renderTeamEditor();
  updateTeamDropdown();
}

function logout(){
  currentUser = null;
  localStorage.removeItem('user');
  location.reload();
}

// ============================================================================
// VIEW SWITCHING
// ============================================================================
function switchView(which){
  document.getElementById('dashboard-view').classList.remove('show');
  document.getElementById('admin-view').classList.remove('show');
  document.getElementById(which + '-view').classList.add('show');
  
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.target.classList.add('active');
}

// ============================================================================
// DASHBOARD
// ============================================================================
function renderDashboard(){
  renderTeamDisplay();
  renderLeaderboard();
}

function renderTeamDisplay(){
  const container = document.getElementById('teamDisplay');
  container.innerHTML = '';
  
  mockDB.teams.forEach(team => {
    const total = mockDB.members.filter(m => m.team_id === team.id).reduce((s, m) => s + m.points, 0);
    const card = document.createElement('div');
    card.className = 'team-card-display';
    card.style.backgroundColor = team.color_hex;
    card.innerHTML = `
      <div class="team-emoji">${team.emoji}</div>
      <div class="team-name">${team.name}</div>
      <div class="team-points">${total} points</div>
    `;
    container.appendChild(card);
  });
}

function renderLeaderboard(){
  const container = document.getElementById('leaderboard');
  const sorted = [...mockDB.members].sort((a, b) => b.points - a.points);
  
  container.innerHTML = sorted.map((m, i) => {
    const team = mockDB.teams.find(t => t.id === m.team_id);
    return `
      <div class="lb-row">
        <div class="lb-rank">#${i+1}</div>
        <div class="lb-info">
          <div class="lb-name">${m.name}</div>
          <div class="lb-team">${team?.emoji} ${team?.name}</div>
        </div>
        <div class="lb-points">${m.points}</div>
      </div>
    `;
  }).join('');
}

// ============================================================================
// ADMIN: TEAM SETUP
// ============================================================================
function renderTeamEditor(){
  const count = parseInt(document.getElementById('teamCount').value);
  const container = document.getElementById('teamEditor');
  container.innerHTML = '';
  
  while(mockDB.teams.length < count){
    mockDB.teams.push({
      id: mockDB.teams.length + 1,
      name: `Team ${mockDB.teams.length + 1}`,
      color_hex: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'),
      emoji: ['🔥','🦅','⚡','🎯','🌟','💎','🚀','🎪'][mockDB.teams.length % 8]
    });
  }
  mockDB.teams = mockDB.teams.slice(0, count);
  
  mockDB.teams.forEach((team, idx) => {
    const card = document.createElement('div');
    card.className = 'team-editor-card';
    card.innerHTML = `
      <div class="label">Team ${idx+1}</div>
      <input type="text" value="${team.name}" onchange="mockDB.teams[${idx}].name=this.value;updatePreview()" placeholder="Team name">
      <input type="color" value="${team.color_hex}" onchange="mockDB.teams[${idx}].color_hex=this.value;updatePreview()" title="Pick a color">
      <div class="color-display" style="background:${team.color_hex};color:#fff;text-shadow:0 0 3px #000">${team.emoji}</div>
    `;
    container.appendChild(card);
  });
  
  updatePreview();
}

function updatePreview(){
  const preview = document.getElementById('teamPreview');
  preview.innerHTML = '';
  
  mockDB.teams.forEach(team => {
    const card = document.createElement('div');
    card.className = 'team-preview-card';
    card.style.backgroundColor = team.color_hex;
    card.innerHTML = `<div class="team-preview-emoji">${team.emoji}</div><div class="team-preview-name">${team.name}</div>`;
    preview.appendChild(card);
  });
}

function saveTeams(){
  document.getElementById('teamMsg').textContent = '✅ Saved ' + mockDB.teams.length + ' teams!';
  document.getElementById('teamMsg').classList.add('show', 'success');
  renderDashboard();
  updateTeamDropdown();
  setTimeout(() => document.getElementById('teamMsg').classList.remove('show'), 3000);
}

function resetTeams(){
  mockDB.teams = [
    { id: 1, name: 'Phoenix', color_hex: '#FF6B6B', emoji: '🔥' },
    { id: 2, name: 'Falcon', color_hex: '#4ECDC4', emoji: '🦅' },
    { id: 3, name: 'Warriors', color_hex: '#FFE66D', emoji: '⚡' }
  ];
  document.getElementById('teamCount').value = '3';
  renderTeamEditor();
}

// ============================================================================
// ADMIN: MEMBER MANAGEMENT
// ============================================================================
function addMember(){
  const name = document.getElementById('newMemberName').value.trim();
  const points = parseInt(document.getElementById('newMemberPoints').value) || 0;
  const teamId = parseInt(document.getElementById('newMemberTeam').value);
  
  if(!name) return alert('Name required');
  
  mockDB.members.push({ id: nextMemberId++, name, team_id: teamId, points });
  document.getElementById('newMemberName').value = '';
  document.getElementById('newMemberPoints').value = '0';
  
  document.getElementById('memberMsg').textContent = '✅ Added ' + name + '!';
  document.getElementById('memberMsg').classList.add('show', 'success');
  
  renderDashboard();
  renderMembersList();
  updateTeamDropdown();
  
  setTimeout(() => document.getElementById('memberMsg').classList.remove('show'), 3000);
}

function renderMembersList(){
  const container = document.getElementById('membersList');
  
  container.innerHTML = mockDB.members.map(m => {
    const team = mockDB.teams.find(t => t.id === m.team_id);
    return `
      <div class="member-item">
        <div>
          <div class="member-name">${m.name}</div>
          <div class="member-team">${team?.emoji} ${team?.name}</div>
        </div>
        <div class="member-points">${m.points} pts</div>
      </div>
    `;
  }).join('');
}

function updateTeamDropdown(){
  const sel = document.getElementById('newMemberTeam');
  sel.innerHTML = mockDB.teams.map(t => `<option value="${t.id}">${t.emoji} ${t.name}</option>`).join('');
}

// ============================================================================
// INIT
// ============================================================================
window.addEventListener('load', () => {
  const saved = localStorage.getItem('user');
  if(saved){
    currentUser = JSON.parse(saved);
    enterApp();
  }
});
</script>

</html>
